# LexiReview Marketing + LexiForge Dashboard
# Place this in /etc/nginx/sites-available/lexireview.in

server {
    listen 80;
    server_name lexireview.in www.lexireview.in;
    return 301 https://lexireview.in$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.lexireview.in;

    ssl_certificate /etc/letsencrypt/live/lexireview.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lexireview.in/privkey.pem;

    return 301 https://lexireview.in$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lexireview.in;

    ssl_certificate /etc/letsencrypt/live/lexireview.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lexireview.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Next.js static files
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
    }

    # Sitemap and robots
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1h;
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1h;
    }

    # API routes
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # Everything else -> Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
